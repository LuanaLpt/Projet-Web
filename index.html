<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Hi+Melody&display=swap");
    </style>

    <title>PromoENI- Accueil</title>
  </head>
  <body
    class="bg-[#FDF6EC] dark:bg-[#6B3F2A] font-[Hi_Melody] text-[#6B3F2A] dark:text-[#FDF6EC] m-0"
  >
    <nav class="flex items-center justify-between mt-10 ml-5 mr-5">
      <img class="h-[10vh] logoThemeClair" src="enilogopng.png" />
      <img class="h-[10vh] logoThemeSombre" src="enilogopngthemesombre.png" />
      <h1 class="border-b text-7xl mt-5">Promo EDWM2602FT</h1>
      <div class="flex-wrap flex flex-row gap-10 text-3xl">
        <a
          href="index.html"
          class="hover:bg-[#F9E2C3] hover:dark:bg-[#97583B] border shadow-lg rounded-md w-1/5 p-6 flex items-center justify-center"
          >Accueil</a
        >
        <a
          href="preferences.html"
          class="hover:bg-[#F9E2C3] hover:dark:bg-[#97583B] border shadow-lg rounded-md w-1/5 p-6 flex items-center justify-center"
          >Préférences</a
        >
        <a
          href="map.html"
          class="hover:bg-[#F9E2C3] hover:dark:bg-[#97583B] border shadow-lg rounded-md w-1/5 p-6 flex items-center justify-center"
          >Carte</a
        >
        <a
          href="info.html"
          class="hover:bg-[#F9E2C3] hover:dark:bg-[#97583B] border shadow-lg rounded-md w-1/5 p-6 flex items-center justify-center"
          >Informations</a
        >
      </div>
    </nav>
    <div class="flex justify-end gap-2 text-3xl mr-40">
      Type affichage
      <fieldset>
        <legend>
          <input
            class="appearance-none w-4 h-4 border-2 border-[#6B3F2A] rounded-full dark:border-[#FDF6EC] dark:checked:bg-[#FDF6EC] dark:checked:border-[#FDF6EC] checked:bg-[#6B3F2A] checked:border-[#6B3F2A] cursor-pointer"
            type="radio"
            name="affichage"
            value="liste"
            id="liste"
            checked
          />
          <label for="liste">Liste (Table)</label>
          <input
            class="appearance-none w-4 h-4 border-2 border-[#6B3F2A] rounded-full dark:border-[#FDF6EC] dark:checked:bg-[#FDF6EC] dark:checked:border-[#FDF6EC] checked:bg-[#6B3F2A] checked:border-[#6B3F2A] cursor-pointer"
            type="radio"
            name="affichage"
            value="cartes"
            id="cartes"
          />
          <label for="cartes">Cartes (Grid)</label>
        </legend>
      </fieldset>
    </div>
    <h2 class="ml-16 mt-16 text-4xl">Liste des apprenants</h2>
    <div class="prefListe gap-10 flex text-3xl ml-16 w-full">
      <table  class="w-1/2">
        <thead>
          <tr class="flex flex-row dark:bg-[#97583B] bg-[#F9E2C3]">
            <th class="p-10 w-1/4 flex items-center justify-center ">
              Nom
            </th>
            <th class="p-10 w-1/4 flex items-center justify-center">
              Prénom
            </th>
            <th class="p-10 w-1/4 flex items-center justify-center">
              Ville
            </th>
            <th class="p-10 w-1/4 flex items-center justify-center">Détails</th>
          </tr>
        </thead>
        <tbody id="tableau"></tbody>
      </table>
      <div id="detailsSupp" class="sticky top-4 hidden border h-full w-1/3">
      </div>
    </div>
    <div class="prefCartes hidden mt-16 text-3xl ml-6">
      <div
        class="hover:bg-[#F9E2C3] hover:dark:bg-[#97583B] shadow-lg p-6 w-1/6 border flex flex-col items-center"
      >
        <div>Prenom Nom</div>
        <div>Ville</div>
        <div>Détails</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
